<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>x-bit · Proton</title>
<meta name="description" content="x-bit Proton — Disha AI chat: rank prediction, college prediction, priority list matching.">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#000; --surface:#0a0a0a; --surface-2:#111; --surface-3:#161616;
  --border:rgba(255,255,255,0.08); --border-strong:rgba(255,255,255,0.16); --border-focus:rgba(255,255,255,0.5);
  --text-0:#fff; --text-1:#e8e8e8; --text-2:#8a8a8a; --text-3:#454545;
  --accent:#fff; --danger:#ff453a; --success:#30d158; --warning:#ff9f0a;
  --font-d:'Space Grotesk',sans-serif; --font-m:'DM Mono',monospace;
  --r:16px; --r-sm:12px; --r-xs:8px;
}
[data-theme="light"]{
  --bg:#f4f4f6; --surface:#fff; --surface-2:#f0f0f2; --surface-3:#e9e9ec;
  --border:rgba(0,0,0,0.08); --border-strong:rgba(0,0,0,0.16); --border-focus:rgba(0,0,0,0.5);
  --text-0:#0a0a0a; --text-1:#1c1c1e; --text-2:#6b6b6f; --text-3:#a2a2a6;
}
html{ height:100%; }
body{
  background:var(--bg); color:var(--text-1); font-family:var(--font-d);
  height:100vh; height:calc(var(--vh, 1vh) * 100); overflow:hidden; -webkit-font-smoothing:antialiased;
  display:flex; flex-direction:column; transition:background .3s,color .3s;
  width:100%; max-width:100vw; overflow-x:hidden;
}
/* ═══ TOP BAR ═══ */
.topbar{
  display:flex; align-items:center; justify-content:space-between;
  padding:calc(14px + env(safe-area-inset-top)) 18px 10px; flex-shrink:0;
}
.icon-btn{
  width:38px; height:38px; border-radius:50%; background:var(--surface-2);
  border:1px solid var(--border); color:var(--text-1); display:flex; align-items:center;
  justify-content:center; cursor:pointer; font-size:.85rem; transition:.2s;
}
.icon-btn:hover{ border-color:var(--border-strong); }
.topbar-title{ display:flex; align-items:center; gap:8px; }
.topbar-title img{ height:22px; width:auto; display:block; }
.topbar-title .status-dot{ width:6px;height:6px;border-radius:50%;background:var(--accent);opacity:.6; }
.topbar-title span{ font-weight:700; font-size:.92rem; letter-spacing:-0.02em; }

/* ═══ CHAT AREA ═══ */
.chat-wrap{ flex:1; overflow-y:auto; padding:8px 16px 12px; scroll-behavior:smooth; }
.chat-wrap::-webkit-scrollbar{ width:4px; }
.chat-wrap::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:4px; }

.empty-hero{
  height:100%; display:flex; flex-direction:column; align-items:center; justify-content:center;
  text-align:center; gap:14px; padding-bottom:10vh;
}
.empty-hero img{ width:72px; height:72px; opacity:.92; }
.empty-hero .eh-title{ font-size:1.15rem; font-weight:700; letter-spacing:-0.02em; color:var(--text-0); }
.empty-hero .eh-sub{ font-family:var(--font-m); font-size:.7rem; color:var(--text-3); letter-spacing:.05em; }

.msg-row{ display:flex; margin-bottom:14px; animation:msgIn .25s cubic-bezier(.16,1,.3,1) both; }
@keyframes msgIn{ from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
.msg-row.user{ justify-content:flex-end; }
.msg-bubble{
  max-width:82%; padding:12px 16px; border-radius:var(--r-sm); font-size:.86rem; line-height:1.55;
}
.msg-row.user .msg-bubble{ background:var(--text-0); color:var(--bg); border-bottom-right-radius:4px; }
.msg-row.assistant .msg-bubble{ background:var(--surface-2); border:1px solid var(--border); border-bottom-left-radius:4px; max-width:92%; }
.msg-row.assistant{ flex-direction:column; align-items:flex-start; }
.msg-tag{ font-family:var(--font-m); font-size:.5rem; color:var(--text-3); letter-spacing:.15em; text-transform:uppercase; margin:0 2px 5px; }

/* inline CTA chip inside assistant messages */
.chip-row{ display:flex; flex-wrap:wrap; gap:6px; margin-top:10px; }
.mini-chip{
  display:inline-flex; align-items:center; gap:6px; background:transparent; border:1px solid var(--border-strong);
  border-radius:20px; padding:7px 13px; font-family:var(--font-m); font-size:.62rem; color:var(--text-1);
  cursor:pointer; transition:.2s; letter-spacing:.03em;
}
.mini-chip:hover{ background:var(--text-0); color:var(--bg); border-color:var(--text-0); }
.mini-chip i{ font-size:.6rem; }

/* ═══ CARD (forms rendered inline in chat) ═══ */
.chat-card{
  background:var(--surface); border:1px solid var(--border); border-radius:var(--r);
  padding:18px; margin-top:4px; width:100%; max-width:420px;
}
.chat-card-title{ font-size:.82rem; font-weight:700; color:var(--text-0); margin-bottom:14px; letter-spacing:-0.01em; }
.mode-tabs{ display:flex; gap:4px; background:var(--surface-2); border:1px solid var(--border); border-radius:20px; padding:3px; margin-bottom:14px; }
.mode-tab{ flex:1; text-align:center; padding:7px 4px; border-radius:16px; font-family:var(--font-m); font-size:.6rem; letter-spacing:.05em; color:var(--text-2); cursor:pointer; transition:.2s; }
.mode-tab.active{ background:var(--text-0); color:var(--bg); font-weight:600; }
.field-mini-label{ font-family:var(--font-m); font-size:.55rem; color:var(--text-3); letter-spacing:.1em; text-transform:uppercase; margin-bottom:6px; }
.subj-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:10px; }
.subj-input{ text-align:center; font-weight:700; font-size:1rem; padding:10px 6px; }
.xin{
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-xs);
  padding:11px 13px; color:var(--text-0); font-family:var(--font-d); font-size:16px; font-weight:500;
  outline:none; transition:.2s;
}
.xin:focus{ border-color:var(--border-focus); }
.xin::placeholder{ color:var(--text-3); }
.field-block{ margin-bottom:12px; }
.section-divider{ height:1px; background:var(--border); margin:14px 0; }
.btn-solid{
  width:100%; background:var(--text-0); color:var(--bg); border:none; border-radius:var(--r-xs);
  padding:13px; font-family:var(--font-d); font-size:.72rem; font-weight:800; letter-spacing:.1em;
  text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px;
  transition:.2s; margin-top:6px;
}
.btn-solid:hover{ opacity:.88; }
.btn-solid:disabled{ opacity:.3; cursor:not-allowed; }
.btn-ghost{
  width:100%; background:transparent; color:var(--text-1); border:1px solid var(--border-strong); border-radius:var(--r-xs);
  padding:11px; font-family:var(--font-m); font-size:.65rem; letter-spacing:.06em; cursor:pointer; transition:.2s;
  display:flex; align-items:center; justify-content:center; gap:8px; margin-top:8px;
}
.btn-ghost:hover{ border-color:var(--text-0); }
.link-hint{ font-family:var(--font-m); font-size:.62rem; color:var(--text-2); text-decoration:underline; text-underline-offset:3px; cursor:pointer; }
.link-hint:hover{ color:var(--text-0); }

/* result summary */
.rank-result{ text-align:center; padding:8px 0 4px; }
.rank-result .rr-label{ font-family:var(--font-m); font-size:.55rem; color:var(--text-3); letter-spacing:.15em; text-transform:uppercase; margin-bottom:6px; }
.rank-result .rr-value{ font-size:2.4rem; font-weight:800; letter-spacing:-0.03em; color:var(--text-0); line-height:1; margin-bottom:10px; }
.rr-meta{ font-family:var(--font-m); font-size:.62rem; color:var(--text-2); margin-bottom:14px; }

/* pill/dropdown selects for college flow */
.dd-mini{ position:relative; }
.dd-mini-trigger{
  width:100%; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--r-xs);
  padding:11px 13px; display:flex; align-items:center; justify-content:space-between; cursor:pointer;
  font-size:.83rem; font-weight:500; color:var(--text-0); transition:.2s;
}
.dd-mini-trigger.placeholder{ color:var(--text-3); }
.dd-mini-menu{
  position:absolute; top:calc(100% + 4px); left:0; right:0; background:var(--surface-3);
  border:1px solid var(--border-strong); border-radius:var(--r-xs); z-index:50; display:none;
  max-height:220px; overflow-y:auto;
}
.dd-mini-menu.show{ display:block; }
.dd-mini-item{ padding:10px 13px; font-size:.76rem; color:var(--text-2); cursor:pointer; border-bottom:1px solid var(--border); }
.dd-mini-item:last-child{ border-bottom:none; }
.dd-mini-item:hover{ background:var(--surface-2); color:var(--text-0); }

/* result cards (college matches) */
.college-result-card{ border:1px solid var(--border); border-radius:var(--r-sm); padding:13px 14px; margin-bottom:8px; background:var(--surface-2); }
.crc-top{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px; margin-bottom:6px; }
.crc-name{ font-size:.78rem; font-weight:700; color:var(--text-0); line-height:1.35; }
.crc-cutoff{ font-family:var(--font-m); font-size:.72rem; font-weight:600; color:var(--text-1); flex-shrink:0; white-space:nowrap; }
.crc-meta{ font-family:var(--font-m); font-size:.58rem; color:var(--text-3); }

/* file upload dropzone in-chat */
.upload-dz{
  border:1.5px dashed var(--border-strong); border-radius:var(--r-sm); padding:22px 14px; text-align:center;
  cursor:pointer; transition:.2s; position:relative;
}
.upload-dz:hover{ border-color:var(--text-0); background:var(--surface-2); }
.upload-dz input{ position:absolute; inset:0; opacity:0; cursor:pointer; }
.upload-dz i{ font-size:1.1rem; color:var(--text-2); margin-bottom:8px; display:block; }
.upload-dz span{ font-size:.72rem; color:var(--text-2); }

/* small non-interactive logo loading badge — replaces fa-spin loaders */
.loading-badge{
  width:28px; height:28px; flex-shrink:0; border-radius:8px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; pointer-events:none; touch-action:none;
}
.loading-badge iframe{ width:100%; height:100%; border:none; pointer-events:none; touch-action:none; background:transparent; }
.loading-line{ display:flex; align-items:center; gap:10px; }

/* ═══ SIDEBAR ═══ */
.sb-backdrop{ position:fixed; inset:0; background:rgba(0,0,0,.6); z-index:400; opacity:0; pointer-events:none; transition:.25s; }
.sb-backdrop.open{ opacity:1; pointer-events:all; }
.sidebar{
  position:fixed; top:0; left:-300px; width:280px; height:100vh; background:var(--surface);
  border-right:1px solid var(--border); z-index:401; transition:left .35s cubic-bezier(.16,1,.3,1);
  display:flex; flex-direction:column;
}
.sidebar.open{ left:0; }
.sb-top{ padding:20px 18px; border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; }
.sb-blob{ width:42px; height:42px; border-radius:50%; background:var(--text-0); color:var(--bg); display:flex; align-items:center; justify-content:center; font-weight:800; font-size:1.05rem; flex-shrink:0; }
.sb-name{ font-size:.88rem; font-weight:700; color:var(--text-0); }
.sb-tag{ font-family:var(--font-m); font-size:.55rem; color:var(--text-3); margin-top:3px; letter-spacing:.08em; }
.sb-newchat{
  margin:14px 18px 6px; padding:11px; border:1px solid var(--border-strong); border-radius:var(--r-xs);
  display:flex; align-items:center; justify-content:center; gap:8px; cursor:pointer; font-family:var(--font-m);
  font-size:.65rem; letter-spacing:.06em; color:var(--text-1); transition:.2s;
}
.sb-newchat:hover{ background:var(--text-0); color:var(--bg); border-color:var(--text-0); }
.sb-section-label{ font-family:var(--font-m); font-size:.52rem; color:var(--text-3); letter-spacing:.15em; text-transform:uppercase; padding:14px 18px 6px; }
.sb-recent{ flex:1; overflow-y:auto; padding:0 10px; }
.sb-recent-item{ padding:10px 10px; border-radius:var(--r-xs); cursor:pointer; transition:.15s; margin-bottom:2px; }
.sb-recent-item:hover{ background:var(--surface-2); }
.sb-recent-item .rt-title{ font-size:.75rem; font-weight:600; color:var(--text-1); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.sb-recent-item .rt-sub{ font-family:var(--font-m); font-size:.55rem; color:var(--text-3); margin-top:2px; }
.sb-empty{ padding:20px 18px; font-family:var(--font-m); font-size:.6rem; color:var(--text-3); text-align:center; }
.sb-footer{ border-top:1px solid var(--border); padding:14px 18px 18px; }
.sb-dark-row{ display:flex; align-items:center; justify-content:space-between; }
.sb-dark-label{ font-size:.75rem; font-weight:600; color:var(--text-1); display:flex; align-items:center; gap:8px; }
.toggle-pill{ position:relative; width:44px; height:25px; flex-shrink:0; }
.toggle-pill input{ display:none; }
.toggle-track{ position:absolute; inset:0; background:var(--surface-3); border:1px solid var(--border-strong); border-radius:20px; cursor:pointer; transition:.25s; }
.toggle-track::before{ content:''; position:absolute; width:19px; height:19px; left:2px; top:2px; background:var(--text-0); border-radius:50%; transition:.25s cubic-bezier(.16,1,.3,1); }
.toggle-pill input:checked + .toggle-track::before{ transform:translateX(19px); background:var(--bg); }
.toggle-pill input:checked + .toggle-track{ background:var(--text-0); }

/* ═══ ONBOARDING ═══ */
.onboard-overlay{ position:fixed; inset:0; background:rgba(0,0,0,.97); z-index:900; display:flex; align-items:center; justify-content:center; }
.onboard-overlay.hidden{ display:none; }
.onboard-card{ width:88%; max-width:340px; border:1px solid var(--border-strong); border-radius:var(--r); background:var(--surface); padding:38px 28px; animation:msgIn .35s cubic-bezier(.16,1,.3,1) both; }
.onboard-eyebrow{ font-family:var(--font-m); font-size:.58rem; color:var(--text-3); letter-spacing:.2em; text-transform:uppercase; margin-bottom:18px; }
.onboard-card h2{ font-size:1.4rem; font-weight:800; color:var(--text-0); letter-spacing:-0.03em; margin-bottom:26px; line-height:1.2; }
.onboard-card h2 span{ color:var(--text-3); }
.onboard-input{ width:100%; background:transparent; border:none; border-bottom:1px solid var(--border-strong); padding:10px 0; color:var(--text-0); font-family:var(--font-d); font-size:16px; font-weight:500; outline:none; margin-bottom:26px; }
.onboard-input:focus{ border-color:var(--text-0); }
.onboard-btn{ width:100%; background:var(--text-0); color:var(--bg); border:none; border-radius:var(--r-xs); padding:13px; font-family:var(--font-d); font-size:.68rem; font-weight:800; letter-spacing:.14em; text-transform:uppercase; cursor:pointer; }
.onboard-btn:disabled{ opacity:.25; }

/* ═══ FULL RESULTS PAGE (for "see more colleges") ═══ */
.results-page{ position:fixed; inset:0; background:var(--bg); z-index:800; display:flex; flex-direction:column; transform:translateY(100%); transition:transform .35s cubic-bezier(.16,1,.3,1); }
.results-page.open{ transform:translateY(0); }
.rp-header{ display:flex; align-items:center; gap:12px; padding:16px 18px; border-bottom:1px solid var(--border); flex-shrink:0; }
.rp-header h3{ font-size:.95rem; font-weight:700; flex:1; }
.rp-body{ flex:1; overflow-y:auto; padding:16px 18px 40px; }

/* ═══ COMPOSER ═══ */
.composer-wrap{ flex-shrink:0; padding:8px 14px calc(14px + env(safe-area-inset-bottom)); }
.pill-row{ display:flex; gap:6px; margin-bottom:8px; overflow-x:auto; padding-bottom:2px; }
.pill-row::-webkit-scrollbar{ display:none; }
.cmd-pill{
  flex-shrink:0; display:flex; align-items:center; gap:6px; background:var(--surface-2); border:1px solid var(--border-strong);
  border-radius:20px; padding:8px 14px; font-family:var(--font-m); font-size:.63rem; color:var(--text-1);
  cursor:pointer; transition:.2s; white-space:nowrap;
}
.cmd-pill:hover{ background:var(--text-0); color:var(--bg); border-color:var(--text-0); }
.cmd-pill i{ font-size:.62rem; }
.composer-box{ background:var(--surface-2); border:1px solid var(--border); border-radius:24px; padding:10px 8px 10px 18px; display:flex; align-items:flex-end; gap:8px; }
.composer-input{
  flex:1; background:none; border:none; outline:none; resize:none; color:var(--text-0); font-family:var(--font-d);
  font-size:16px; max-height:100px; padding:8px 0; line-height:1.4;
}
.composer-input::placeholder{ color:var(--text-3); }
.composer-actions{ display:flex; align-items:center; gap:4px; flex-shrink:0; }
.comp-icon-btn{ width:34px; height:34px; border-radius:50%; border:none; background:transparent; color:var(--text-2); display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.85rem; transition:.2s; }
.comp-icon-btn:hover{ color:var(--text-0); }
.send-btn{ width:36px; height:36px; border-radius:50%; background:var(--text-0); color:var(--bg); border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:.85rem; transition:.2s; }
.send-btn:hover{ opacity:.85; }
.send-btn:disabled{ opacity:.25; cursor:not-allowed; }

@media(max-width:420px){ .msg-bubble{ max-width:90%; } .chat-card{ max-width:100%; } }
</style>
</head>
<body>

<!-- ═══ ONBOARDING ═══ -->
<div class="onboard-overlay" id="onboardModal">
  <div class="onboard-card">
    <div class="onboard-eyebrow">x-bit · Proton</div>
    <h2>What's<br><span>your name?</span></h2>
    <input type="text" class="onboard-input" id="onboardNameInput" placeholder="Enter your name" autocomplete="off" spellcheck="false" maxlength="30">
    <button class="onboard-btn" id="onboardSubmitBtn" disabled>Continue</button>
  </div>
</div>

<!-- ═══ SIDEBAR ═══ -->
<div class="sb-backdrop" id="sbBackdrop"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-top">
    <div class="sb-blob" id="sbBlob">?</div>
    <div>
      <div class="sb-name" id="sbName">User</div>
      <div class="sb-tag">x-bit · Proton</div>
    </div>
  </div>
  <div class="sb-newchat" id="sbNewChat"><i class="fa-solid fa-plus"></i> New chat</div>
  <div class="sb-section-label">Recent chats</div>
  <div class="sb-recent" id="sbRecent"></div>
  <div class="sb-footer">
    <div class="sb-dark-row">
      <div class="sb-dark-label"><i class="fa-solid fa-moon"></i> Dark mode</div>
      <label class="toggle-pill">
        <input type="checkbox" id="darkToggle" checked>
        <span class="toggle-track"></span>
      </label>
    </div>
  </div>
</div>

<!-- ═══ TOP BAR ═══ -->
<div class="topbar">
  <button class="icon-btn" id="menuBtn"><i class="fa-solid fa-bars-staggered"></i></button>
  <div class="topbar-title">
    <img src="./logo.png" alt="x-bit" onerror="this.style.display='none'">
    <span>x-bit proton</span>
    <span class="status-dot"></span>
  </div>
  <button class="icon-btn" id="newChatTopBtn"><i class="fa-regular fa-pen-to-square"></i></button>
</div>

<!-- ═══ CHAT ═══ -->
<div class="chat-wrap" id="chatWrap">
  <div class="empty-hero" id="emptyHero">
    <img src="./logo.png" alt="" onerror="this.style.display='none'">
    <div class="eh-title" id="heroGreeting">Hey there</div>
    <div class="eh-sub">Powered by x0s</div>
  </div>
  <div id="chatBody" style="display:none;"></div>
</div>

<!-- ═══ RESULTS PAGE (full college list) ═══ -->
<div class="results-page" id="resultsPage">
  <div class="rp-header">
    <button class="icon-btn" id="rpClose"><i class="fa-solid fa-arrow-left"></i></button>
    <h3 id="rpTitle">All matches</h3>
  </div>
  <div class="rp-body" id="rpBody"></div>
</div>

<!-- ═══ COMPOSER ═══ -->
<div class="composer-wrap">
  <div class="pill-row">
    <div class="cmd-pill" id="pillRank"><i class="fa-solid fa-chart-line"></i> Rank Prediction</div>
    <div class="cmd-pill" id="pillCollege"><i class="fa-solid fa-building-columns"></i> College Prediction</div>
    <div class="cmd-pill" id="pillPriority"><i class="fa-solid fa-list-ol"></i> Priority List</div>
  </div>
  <div class="composer-box">
    <textarea class="composer-input" id="composerInput" placeholder="Message Proton…" rows="1"></textarea>
    <div class="composer-actions">
      <button class="comp-icon-btn"><i class="fa-solid fa-microphone"></i></button>
      <button class="send-btn" id="sendBtn"><i class="fa-solid fa-arrow-up"></i></button>
    </div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════════════════════
   CONFIG / CONSTANTS

/* ══════════════════════════════════════════════════════════
   RANK PREDICTOR ENGINE  (2PU boards + KCET → estimated rank)
   ══════════════════════════════════════════════════════════ */
class KCETRankPredictor{
  constructor(){
    this.totalCandidates = 315000;
    this.anchors = [
      {p:100.0,r:1},{p:98.50,r:10},{p:96.00,r:100},{p:92.50,r:1000},{p:88.50,r:3000},
      {p:85.00,r:5500},{p:81.50,r:9000},{p:77.00,r:15000},{p:72.00,r:25000},
      {p:65.00,r:50000},{p:58.00,r:75000},{p:0.00,r:315000}
    ];
    this.formulas = [];
    this._compile();
  }
  _compile(){
    for(let i=0;i<this.anchors.length-1;i++){
      const up=this.anchors[i], lo=this.anchors[i+1];
      const M=(Math.log(lo.r)-Math.log(up.r))/(lo.p-up.p);
      const C=Math.log(up.r)-M*up.p;
      this.formulas.push({maxP:up.p, minP:lo.p, M, C});
    }
  }
  predictRank(pct){
    if(pct>=100) return 1;
    if(pct<=0) return this.totalCandidates;
    for(const f of this.formulas){
      if(pct<=f.maxP && pct>f.minP){
        let rank = Math.exp(f.M*pct+f.C);
        const upR=this.anchors.find(a=>a.p===f.maxP).r, loR=this.anchors.find(a=>a.p===f.minP).r;
        return Math.round(Math.max(Math.min(upR,loR), Math.min(Math.max(upR,loR), rank)));
      }
    }
    return this.totalCandidates;
  }
}
const kcetEngine = new KCETRankPredictor();

function computeFinalPercentage(boardsPct, kcetPct){ return (boardsPct/2) + (kcetPct/2); }

function wireRankCard(card, onComplete){
  // mode tab switching
  card.querySelectorAll('.mode-tabs').forEach(tabGroup=>{
    const group = tabGroup.getAttribute('data-group');
    tabGroup.querySelectorAll('.mode-tab').forEach(tab=>{
      tab.addEventListener('click', ()=>{

        tab.classList.add('active');
        const mode = tab.getAttribute('data-mode');
        card.querySelectorAll(`.mode-panel[data-panel^="${group}"]`).forEach(p=>p.style.display='none');
        card.querySelector(`.mode-panel[data-panel="${group}-${mode}"]`).style.display='block';
      });
    });
  });
  // clamp helper
  function clamp(el, max){
    el.addEventListener('input', ()=>{
      let v = parseFloat(el.value);
      if(isNaN(v)) return;
      if(v>max) el.value = max;
      if(v<0) el.value = 0;
    });
  }
  ['b-phy','b-chem','b-math'].forEach(c=>clamp(card.querySelector('.'+c),100));
  clamp(card.querySelector('.b-total'),300);
  clamp(card.querySelector('.b-pct'),100);
  ['k-phy','k-chem','k-math'].forEach(c=>clamp(card.querySelector('.'+c),60));
  clamp(card.querySelector('.k-total'),180);
  clamp(card.querySelector('.k-pct'),100);

  card.querySelector('[data-action="predict-rank"]').addEventListener('click', ()=>{
    const boardsPct = readBoardsPercent(card);
    const kcetPct = readKcetPercent(card);
    if(boardsPct===null || kcetPct===null){
      protonSays(`<i class="fa-solid fa-triangle-exclamation"></i> Fill in at least one boards field and one KCET field to predict your rank.`);
      return;

    const finalPct = computeFinalPercentage(boardsPct, kcetPct);
    const rank = kcetEngine.predictRank(finalPct);
    renderRankResult(rank, boardsPct, kcetPct, finalPct, onComplete);
  });
}

function readBoardsPercent(card){

  if(!isNaN(total)) return (Math.min(300,total)/300)*100;
  const pct = parseFloat(card.querySelector('.b-pct').value);
  if(!isNaN(pct)) return Math.min(100,pct);
  return null;
}

/* ══════════════════════════════════════════════════════════
   NLP QUICK-PARSE — direct chat rank requests
   e.g. "i got 97 in boards and 130 in kcet predict my rank"
   ══════════════════════════════════════════════════════════ */
function tryParseRankRequest(text){
  const t = text.toLowerCase();
  if(!/rank/.test(t)) return null;
  if(!/(board|pu|kcet|cet)/.test(t)) return null;

  // capture "<num> in/for boards|pu" and "<num> in/for kcet|cet"
  const boardsMatch = t.match(/(\d+(?:\.\d+)?)\s*%?\s*(?:in|for)?\s*(?:boards|pu|2nd\s*pu|puc)/) ||
                       t.match(/(?:boards|pu|2nd\s*pu|puc)[^\d]{0,10}(\d+(?:\.\d+)?)/);
  const kcetMatch = t.match(/(\d+(?:\.\d+)?)\s*%?\s*(?:in|for)?\s*(?:kcet|cet)/) ||
                     t.match(/(?:kcet|cet)[^\d]{0,10}(\d+(?:\.\d+)?)/);
  if(!boardsMatch || !kcetMatch) return null;

  const boardsNum = parseFloat(boardsMatch[1]);
  const kcetNum = parseFloat(kcetMatch[1]);
  const wantsPercent = /%|percent/.test(t);

  let boardsPct, kcetPct;
  if(wantsPercent || boardsNum<=100){ boardsPct = boardsNum; } else { boardsPct = (Math.min(300,boardsNum)/300)*100; }
  if(kcetNum<=100 && (wantsPercent || kcetNum<=100)){ kcetPct = kcetNum; } else { kcetPct = (Math.min(180,kcetNum)/180)*100; }
  // heuristic override: if kcetNum > 100 it must be marks out of 180
  if(kcetNum>100) kcetPct = (Math.min(180,kcetNum)/180)*100;

  return { boardsPct, kcetPct };
}

function handleDirectRankChat(text){
  const parsed = tryParseRankRequest(text);
  if(!parsed) return false;
  const finalPct = computeFinalPercentage(parsed.boardsPct, parsed.kcetPct);
  const rank = kcetEngine.predictRank(finalPct);
  const html = `Based on <b>${parsed.boardsPct.toFixed(1)}%</b> in boards and <b>${parsed.kcetPct.toFixed(1)}%</b> in KCET, your estimated combined score is <b>${finalPct.toFixed(1)}%</b>.
    <div class="rank-result" style="text-align:left;padding-top:10px;">
      <div class="rr-label">Estimated Rank</div>
      <div class="rr-value" style="font-size:1.8rem;">${rank.toLocaleString('en-IN')}</div>
    </div>
    <div class="chip-row"><div class="mini-chip" data-action="predict-college-direct"><i class="fa-solid fa-arrow-right"></i> Predict College for this rank</div></div>`;

  row.querySelector('[data-action="predict-college-direct"]').addEventListener('click', ()=>{
    startCollegePredictionFlow(rank);
  });
  return true;
}

/* ══════════════════════════════════════════════════════════
   DATA LOADING — lazy-load engineering datasets + branch aliases
   NOTE: firstroundeng.js / firstroundenghk.js both set `window.XOS_CUTOFF`
   on load. We capture it into a keyed cache right after injection so the
   two datasets don't clobber each other.
   ══════════════════════════════════════════════════════════ */
const datasetCache = {}; // { eng: [...], enghk: [...] }
let branchAliasesCache = null;

function loadDataset(which){
  return new Promise((resolve, reject)=>{
    if(datasetCache[which]) return resolve(datasetCache[which]);
    const src = which === 'enghk' ? './firstroundenghk.js' : './firstroundeng.js';
    const script = document.createElement('script');
    script.src = src;
    script.onload = ()=>{
      const data = window.XOS_CUTOFF || [];
      datasetCache[which] = data;
      window.XOS_CUTOFF = undefined;
      resolve(data);
    };
    script.onerror = ()=> reject(new Error(`Could not load ${src}`));
    document.body.appendChild(script);
  });
}
function loadBranchAliases(){
  if(branchAliasesCache) return Promise.resolve(branchAliasesCache);
  return fetch('./branch-aliases.json').then(r=>r.json()).then(data=>{ branchAliasesCache = data; return data; });
}

/* fuzzy branch matcher — normalize + substring + jaccard, same approach
   used across the x0s / KEA predictor tools */
function normBranch(s){ return s.toUpperCase().replace(/[^A-Z0-9\s&]/g,' ').replace(/\s+/g,' ').trim(); }
function matchBranchKey(aliasList, branchKeysOfCollege){
  const keys = Object.keys(branchKeysOfCollege);
  const candidates = aliasList.map(normBranch);
  for(const k of keys){ const nk=normBranch(k); if(candidates.includes(nk)) return k; }
  for(const k of keys){ const nk=normBranch(k); if(candidates.some(c=>nk.includes(c)||c.includes(nk))) return k; }
  let best=null, bestScore=0;
  for(const k of keys){
    const bw = new Set(normBranch(k).split(' ').filter(w=>w.length>1));
    for(const c of candidates){
      const cw = new Set(c.split(' ').filter(w=>w.length>1));
      const inter=[...cw].filter(w=>bw.has(w)).length;
      const union=new Set([...cw,...bw]).size;
      const sc = union? inter/union : 0;
      if(sc>bestScore){ bestScore=sc; best=k; }
    }
  }
  return bestScore>=0.4 ? best : null;
}

function renderCollegeMatches(dataset, category, rank, aliasPool, branchLabel){
  const lowerBound = rank - 1500;
  const results = [];
  for(const college of dataset){
    if(!college.branches) continue;
    const key = matchBranchKey(aliasPool, college.branches);
    if(!key) continue;
    const cutoff = college.branches[key][category];
    if(cutoff===null || cutoff===undefined) continue;
    if(cutoff >= lowerBound){
      results.push({ id:college.id, name:college.name, location:college.location||'Karnataka', branch:key, cutoff, dist: Math.abs(cutoff-rank) });
    }
  }
  results.sort((a,b)=>a.dist-b.dist);
  if(!results.length){
    protonSays(`<i class="fa-regular fa-folder-open"></i> No colleges found for <b>${escapeHtml(branchLabel)}</b> · ${category} near rank ${rank.toLocaleString('en-IN')}.`);
    return;
  }
  const top5 = results.slice(0,5);
  let html = `<b>${results.length}</b> colleges found for <b>${escapeHtml(branchLabel)}</b> · ${category} near rank ${rank.toLocaleString('en-IN')}:<div style="margin-top:10px;">`;
  html += top5.map(r=>collegeCardHtml(r, category)).join('');
  html += `</div>`;
  if(results.length>5){
    html += `<div class="chip-row"><div class="mini-chip" data-action="see-more"><i class="fa-solid fa-arrow-up-right-from-square"></i> See all ${results.length} colleges</div></div>`;
  }
  const row = protonSays(html, `${results.length} colleges found`);
  const seeMore = row.querySelector('[data-action="see-more"]');
  if(seeMore){
    seeMore.addEventListener('click', ()=> openResultsPage(`All matches · ${branchLabel} · ${category}`, results, category));
  }
}

/* PDF parsing — mirrors the KEA predictor's anchor-based extraction */
async function parsePriorityPdf(arrayBuffer){
  const pdf = await pdfjsLib.getDocument({data:arrayBuffer}).promise;
  const tokens = [];
  for(let i=1;i<=pdf.numPages;i++){
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    tc.items.forEach(item=>{ const s=item.str.trim(); if(s.length) tokens.push(s); });
  }
  const results = [];
  const priorityRe = /^\d+$/, codeRe = /^[A-Z]\d{3}[A-Z]{2}$/i;
  const anchors = [];
  for(let i=0;i<tokens.length-1;i++){ if(priorityRe.test(tokens[i]) && codeRe.test(tokens[i+1])) anchors.push(i); }
  for(let a=0;a<anchors.length;a++){
    const idx=anchors[a], priority=parseInt(tokens[idx],10), code=tokens[idx+1].toUpperCase(), collegeId=code.substring(0,4);
    const end = a+1<anchors.length ? anchors[a+1] : tokens.length;
    const rawText = tokens.slice(idx+2,end).join(' ');
    const normalized = rawText.replace(/(\d)\s*,\s*(\d)/g,'$1,$2');
    let branch;
    const feeMatch = normalized.match(/\d{1,3}(?:,\d{2,3})+/);
    if(feeMatch){
      const feeInRaw = rawText.match(/\d{1,3}\s*(?:,\s*\d{2,3}\s*)+/);
      branch = feeInRaw ? rawText.substring(0,feeInRaw.index).trim() : rawText.substring(0,rawText.indexOf(feeMatch[0])).trim();
    } else {
      const numMatch = rawText.match(/\d{5,}/);
      branch = numMatch ? rawText.substring(0,numMatch.index).trim() : rawText.trim();
    }
    branch = branch.replace(/[\s\-–—:]+$/,'').replace(/\s+/g,' ').trim();
    if(branch.length>0) results.push({priority, collegeId, branch});
  }
  return results;
}
function matchPriorityOptions(dataset, options, category, userRank){
  const map = {};
  dataset.forEach(c=>{ map[c.id]=c; });
  return options.map(opt=>{
    const college = map[opt.collegeId];
    if(!college) return {...opt, collegeName:null, status:'no-data', statusLabel:'College N/A', cutoff:null};
    const mb = matchBranchKey([opt.branch], college.branches);
    if(!mb) return {...opt, collegeName:college.name, status:'no-data', statusLabel:'Branch N/A', cutoff:null};
    const cutoff = college.branches[mb][category];
    if(cutoff===null||cutoff===undefined) return {...opt, collegeName:college.name, matchedBranch:mb, status:'no-seat', statusLabel:'No Seat', cutoff:null};
    const eligible = cutoff >= userRank;
    return {...opt, collegeName:college.name, matchedBranch:mb, cutoff, status: eligible?'eligible':'not-eligible', statusLabel: eligible?'Eligible':'Not Eligible'};
  });
}

/* ══════════════════════════════════════════════════════════
   SMART CHAT ENGINE — lightweight tokenizer + similarity classifier
   Trained against ./trainingset.json (KCET intents+entities) and
   ./trainingset1.json (normal chat pairs). No training loop — pure
   bag-of-words / Jaccard nearest-neighbor, so it loads instantly.
   ══════════════════════════════════════════════════════════ */
let kcetTrainingSet = [];
let chatTrainingSet = [];
let smartDataReady = false;

async function loadTrainingData(){
  try{
    const r = await fetch('./trainingset.json');
    if(!r.ok) throw new Error('HTTP ' + r.status);
    kcetTrainingSet = await r.json();
    console.info(`[x-bit] trainingset.json loaded: ${kcetTrainingSet.length} examples`);
  }catch(e){
    console.error('[x-bit] trainingset.json failed to load:', e.message, '— check the exact filename/case in your repo (it is case-sensitive on GitHub Pages).');
    kcetTrainingSet = [];
  }
  try{
    const r2 = await fetch('./trainingset1.json');
    if(!r2.ok) throw new Error('HTTP ' + r2.status);
    chatTrainingSet = await r2.json();
    console.info(`[x-bit] trainingset1.json loaded: ${chatTrainingSet.length} examples`);
  }catch(e){
    console.error('[x-bit] trainingset1.json failed to load:', e.message, '— check the exact filename/case in your repo (it is case-sensitive on GitHub Pages).');
    chatTrainingSet = [];
  }
  kcetTrainingSet.forEach(ex => ex._tokens = new Set(patternTokens(ex.input)));
  chatTrainingSet.forEach(ex => ex._tokens = new Set(tokenize(ex.input)));
  smartDataReady = true;
}

function normalizeText(s){
  return s.toLowerCase().replace(/[^\w\s%.]/g,' ').replace(/\s+/g,' ').trim();
}
function tokenize(s){ return normalizeText(s).split(' ').filter(Boolean); }
// pattern-token version collapses numbers so "124 kcet" and "89 kcet" match the same pattern
function patternTokens(s){ return normalizeText(s).replace(/\d+\.?\d*/g,'#num#').split(' ').filter(Boolean); }

function jaccard(a, b){
  let inter = 0;
  for(const t of a) if(b.has(t)) inter++;
  const union = a.size + b.size - inter;
  return union ? inter/union : 0;
}
function classifyKcetIntent(text){
  if(!kcetTrainingSet.length) return null;
  const q = new Set(patternTokens(text));
  let best=null, bestScore=0;
  for(const ex of kcetTrainingSet){
    const sc = jaccard(q, ex._tokens);
    if(sc > bestScore){ bestScore = sc; best = ex; }
  }
  return best ? { intent: best.output.intent, score: bestScore } : null;
}
function classifyChat(text){
  if(!chatTrainingSet.length) return null;
  const q = new Set(tokenize(text));
  if(!q.size) return null;
  let best=null, bestScore=0;
  for(const ex of chatTrainingSet){
    const sc = jaccard(q, ex._tokens);
    if(sc > bestScore){ bestScore = sc; best = ex; }
  }
  return best && bestScore > 0.3 ? best : null;
}

/* ── ENTITY EXTRACTION (rule-based, keyword-anchored) ── */
const KARNATAKA_CITIES = ['bangalore','bengaluru','mysore','mysuru','mangalore','mangaluru','hubli','hubballi','belgaum','belagavi','dharwad','shimoga','shivamogga','hassan','tumkur','tumakuru','davangere','bellary','ballari','gulbarga','kalaburagi','bidar','raichur','udupi','chikmagalur','kolar','mandya','chitradurga','bagalkot','hospet','bijapur','vijayapura'];
const BRANCH_SHORTHAND = {
  cse:'Computer Science and Engineering', cs:'Computer Science and Engineering',
  ise:'Information Science and Engineering', it:'Information Technology',
  ai:'Artificial Intelligence', 'ai/ml':'Artificial Intelligence and Machine Learning', aiml:'Artificial Intelligence and Machine Learning', ml:'Machine Learning',
  ece:'Electronics and Communication Engineering', eee:'Electrical & Electronics Engineering',
  mech:'Mechanical Engineering', mechanical:'Mechanical Engineering',
  civil:'Civil Engineering', chem:'Chemical Engineering', chemical:'Chemical Engineering',
  aero:'Aerospace Engineering', aeronautical:'Aeronautical Engineering'
};
const ALL_CATEGORY_CODES = [...GENERAL_CATEGORIES, ...HK_CATEGORIES].sort((a,b)=>b.length-a.length);

/* subject-wise marks: "physics 88 chem 92 maths 95" (in either order, either side of the number) */
const SUBJ_RE = { physics:/phy(?:sics)?/, chemistry:/chem(?:istry)?/, maths:/math(?:s|ematics)?/ };
function extractSubjectMarks(segment){
  const marks = {};
  for(const [subj, re] of Object.entries(SUBJ_RE)){
    const after = new RegExp(re.source + '\\D{0,4}(\\d{1,3}(?:\\.\\d+)?)', 'i');
    const before = new RegExp('(\\d{1,3}(?:\\.\\d+)?)\\D{0,4}' + re.source, 'i');
    const mm = segment.match(after) || segment.match(before);
    if(mm) marks[subj] = parseFloat(mm[1]);
  }
  if(marks.physics!=null && marks.chemistry!=null && marks.maths!=null) return marks;
  return null;
}
/* boards OR kcet, handling subjects -> total marks -> percentage, in that priority.
   Searches the FULL text directly with a tight, keyword-anchored gap (rather than
   pre-slicing into segments) so it works regardless of which keyword/number comes first. */
function findScoreBlock(text, keywordSrc, maxTotal, subjectMax){
  const subj = extractSubjectMarks(text);
  if(subj && subj.physics<=subjectMax && subj.chemistry<=subjectMax && subj.maths<=subjectMax){
    const total = subj.physics + subj.chemistry + subj.maths;
    return { total, pct: (total/maxTotal)*100 };
  }
  // keyword-before-number is checked first (tighter, less prone to reaching across
  // into a neighboring clause than the number-before-keyword pattern below).
  // gap is deliberately tight (\D{0,3}) so "boards and 130" (connector word "and")
  // can't be mistaken for "boards 130" / "boards: 130".
  let pctMatch = text.match(new RegExp(keywordSrc + '\\D{0,3}(\\d+(?:\\.\\d+)?)\\s*%', 'i')) ||
                 text.match(new RegExp('(\\d+(?:\\.\\d+)?)\\s*%\\s*(?:in\\s*)?' + keywordSrc, 'i'));
  if(pctMatch){ const v = Math.min(100, parseFloat(pctMatch[1])); return { pct: v, total: (v/100)*maxTotal }; }
  let totalMatch = text.match(new RegExp(keywordSrc + '\\D{0,3}(\\d+(?:\\.\\d+)?)', 'i')) ||
                    text.match(new RegExp('(\\d+(?:\\.\\d+)?)\\s*(?:marks?)?\\s*(?:in\\s*)?' + keywordSrc, 'i'));
  if(totalMatch){
    const v = parseFloat(totalMatch[1]);
    if(v <= maxTotal){
      const pct = v <= 100 ? v : (v/maxTotal)*100;
      return { pct, total: v>100 ? v : (v/100)*maxTotal };
    }
  }
  return null;
}

function extractEntities(text){
  const t = ' ' + text.toLowerCase() + ' ';
  const e = {};

  const boardsResult = findScoreBlock(t, '(?:boards?|2nd\\s*pu|puc?)\\b', 300, 100);
  if(boardsResult) e.boardPercentage = boardsResult.pct;

  const kcetResult = findScoreBlock(t, '(?:kcet|cet)\\b', 180, 60);
  if(kcetResult) e.kcetMarks = kcetResult.total;

  // rank: explicit "rank <n>" (optionally "k" shorthand) OR bare "<n>k" shorthand
  let rm = t.match(/\brank\b[^\d]{0,6}(\d+(?:\.\d+)?)\s*(k)?\b/);
  if(rm){
    let v = parseFloat(rm[1]);
    if(rm[2]) v *= 1000;
    e.rank = Math.round(v);
  } else {
    const km = t.match(/\b(\d+(?:\.\d+)?)\s*k\b/);
    if(km) e.rank = Math.round(parseFloat(km[1]) * 1000);
  }

  for(const code of ALL_CATEGORY_CODES){
    const re = new RegExp('\\b' + code.toLowerCase() + '\\b');
    if(re.test(t)){ e.category = code; break; }
  }

  for(const short in BRANCH_SHORTHAND){
    const re = new RegExp('\\b' + short.replace(/[/]/g,'\\/') + '\\b');
    if(re.test(t)){ e.branch = BRANCH_SHORTHAND[short]; break; }
  }

  for(const city of KARNATAKA_CITIES){
    if(t.includes(city)) { e.location = city.charAt(0).toUpperCase()+city.slice(1); break; }
  }
  if(!e.location){
    const lm = text.match(/\bin\s+([A-Z][a-zA-Z]+)\b/);
    if(lm && !['This','That','My','The'].includes(lm[1])) e.location = lm[1];
  }
  return e;
}
function extractCategoryOnly(text){
  const t = ' ' + text.toLowerCase() + ' ';
  for(const code of ALL_CATEGORY_CODES){
    if(new RegExp('\\b'+code.toLowerCase()+'\\b').test(t)) return code;
  }
  return null;
}

/* ── TEMP "THINKING" BADGE (not persisted, ~1s) ── */
function sleep(ms){ return new Promise(res=>setTimeout(res, ms)); }
function showTempThinking(){
  document.getElementById('emptyHero').style.display='none';
  const body = document.getElementById('chatBody'); body.style.display='block';
  const row = document.createElement('div');
  row.className = 'msg-row assistant';
  row.innerHTML = `<div class="msg-tag">PROTON</div><div class="msg-bubble">${loadingLine('Thinking…')}</div>`;
  body.appendChild(row);
  document.getElementById('chatWrap').scrollTop = document.getElementById('chatWrap').scrollHeight;
  return row;
}

/* ── SLOT-FILLING MEMORY (one level: remembers a partially-complete
   KCET query across turns, e.g. rank+branch known, category missing) ── */
let pendingSmartQuery = null; // { rank, category, branch, location, needs }

/* ── COLLEGE SEARCH (rank±category±branch±location, NOT capped unless UI trims) ── */
async function searchCollegesSmart({ rank, category, branch, location }){
  const dataset = await loadDataset(HK_CATEGORIES.includes(category) ? 'enghk' : 'eng');
  const lowerBound = rank - 1500;
  const branchAliasPool = branch ? [branch] : null;
  const results = [];
  for(const college of dataset){
    if(location && !(college.location||'').toLowerCase().includes(location.toLowerCase())) continue;
    if(!college.branches) continue;
    if(branchAliasPool){
      const key = matchBranchKey(branchAliasPool, college.branches);
      if(!key) continue;
      const cutoff = college.branches[key][category];
      if(cutoff==null || cutoff < lowerBound) continue;
      results.push({ id:college.id, name:college.name, location:college.location||'Karnataka', branch:key, cutoff, dist:Math.abs(cutoff-rank) });
    } else {
      let bestKey=null, bestCutoff=null, bestDist=Infinity;
      for(const [bkey, cd] of Object.entries(college.branches)){
        const cutoff = cd[category];
        if(cutoff==null || cutoff < lowerBound) continue;
        const dist = Math.abs(cutoff-rank);
        if(dist < bestDist){ bestDist=dist; bestKey=bkey; bestCutoff=cutoff; }
      }
      if(bestKey) results.push({ id:college.id, name:college.name, location:college.location||'Karnataka', branch:bestKey, cutoff:bestCutoff, dist:bestDist });
    }
  }
  results.sort((a,b)=>a.dist-b.dist);
  return results;
}

function buildSmartCollegeAnswer(results, { rank, branch, location, category }){
  const branchLabel = branch ? escapeHtml(branch) : null;
  if(!results.length){
    let html = `Doesn't look likely${branchLabel?` for <b>${branchLabel}</b>`:''}${location?` in <b>${escapeHtml(location)}</b>`:''} at rank ${rank.toLocaleString('en-IN')} (${category}) — no eligible seats this round.`;
    return html;
  }
  const shown = results.slice(0,5);
  const names = results.slice(0,3).map(r=>getShortName(r.name)).join(', ');
  let html = `Yes — you could get${branchLabel?` <b>${branchLabel}</b>`:''}${location?` in <b>${escapeHtml(location)}</b>`:''}. <b>${results.length}</b> matching option${results.length>1?'s':''}, closest: ${escapeHtml(names)}${results.length>3?` +${results.length-3} more`:''}.`;
  html += `<div style="margin-top:10px;">` + shown.map(r=>collegeCardHtml(r, category)).join('') + `</div>`;
  if(results.length>5){
    html += `<div class="chip-row"><div class="mini-chip" data-action="see-more-smart">See all ${results.length}${location?` in ${escapeHtml(location)}`:''}</div></div>`;
  }
  return html;
}

/* ── MAIN ROUTER ── */
async function handleSmartMessage(rawText){
  const thinkingRow = showTempThinking();
  await sleep(900);
  thinkingRow.remove();

  let entities = extractEntities(rawText);

  // merge with any pending slot-fill context from a previous turn
  if(pendingSmartQuery){
    const merged = Object.assign({}, pendingSmartQuery.known, entities);
    if(!merged.category){ const c = extractCategoryOnly(rawText); if(c) merged.category = c; }
    entities = merged;
  }

  const kcetGuess = classifyKcetIntent(rawText);
  const looksKcetRelated = entities.kcetMarks!=null || entities.boardPercentage!=null || entities.rank!=null ||
    entities.category || entities.branch || /\b(kcet|cet|rank|board|puc?)\b/i.test(rawText) || !!pendingSmartQuery;

  if(looksKcetRelated){
    await routeKcetQuery(kcetGuess ? kcetGuess.intent : 'rank_prediction', entities);
    return;
  }

  const chatGuess = classifyChat(rawText);
  if(chatGuess){ protonSays(escapeHtmlKeepEmoji(chatGuess.output)); return; }

  protonSays(`I can help with <b>rank prediction</b>, <b>college prediction</b>, or matching your <b>priority list</b> — use the pills above, or just tell me your boards % and KCET score together.`);
}
// chat training answers already contain emoji/punctuation only — safe to render directly, still escape angle brackets defensively
function escapeHtmlKeepEmoji(s){ return String(s).replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

async function routeKcetQuery(intent, entities){
  // 1) derive rank if we have both marks components but no rank yet
  if(entities.rank==null && entities.kcetMarks!=null && entities.boardPercentage!=null){
    const kcetPct = (Math.min(180, entities.kcetMarks)/180)*100;
    const finalPct = computeFinalPercentage(entities.boardPercentage, kcetPct);
    entities.rank = kcetEngine.predictRank(finalPct);
    protonSays(`Based on <b>${entities.boardPercentage}%</b> boards and <b>${entities.kcetMarks}</b> KCET marks, your estimated rank is <b>${entities.rank.toLocaleString('en-IN')}</b>.`);
  }

  // 2) pure rank-prediction intent with no college ask — stop here if nothing else was requested
  const wantsCollege = intent!=='rank_prediction' && intent!=='rank_inquiry' || entities.category || entities.branch || entities.location;

  if(entities.rank==null){
    pendingSmartQuery = { known: entities, needs:['rank'] };
    protonSays(`Got it — what's your KCET score (or boards % + KCET score) so I can estimate your rank?`);
    return;
  }
  if(!wantsCollege){
    pendingSmartQuery = null;
    return;
  }
  if(!entities.category){
    pendingSmartQuery = { known: entities, needs:['category'] };
    protonSays(`Rank ${entities.rank.toLocaleString('en-IN')} noted. Which category should I check against — GM, 1G, 2AG, SC, ST…?`);
    return;
  }

  pendingSmartQuery = null;
  const thinkingRow2 = showTempThinking();
  try{
    const results = await searchCollegesSmart(entities);
    thinkingRow2.remove();
    const row = protonSays(buildSmartCollegeAnswer(results, entities), `${results.length} matches`);
    const seeMore = row.querySelector('[data-action="see-more-smart"]');
    if(seeMore){
      seeMore.addEventListener('click', ()=> openResultsPage(
        `All matches${entities.location?` · ${entities.location}`:''}`, results, entities.category
      ));
    }
  }catch(e){
    thinkingRow2.remove();
    protonSays(`<i class="fa-solid fa-triangle-exclamation"></i> Couldn't load the college dataset (${e.message}).`);
  }
}

/* ══════════════════════════════════════════════════════════
   COMPOSER
   ══════════════════════════════════════════════════════════ */
function initComposer(){
  const input = document.getElementById('composerInput');
  const sendBtn = document.getElementById('sendBtn');
  input.addEventListener('input', ()=>{ input.style.height='auto'; input.style.height=Math.min(100,input.scrollHeight)+'px'; });
  function send(){
    const text = input.value.trim();
    if(!text) return;
    userSays(text);
    input.value=''; input.style.height='auto';
    handleSmartMessage(text);
  }
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e=>{ if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); send(); } });

  document.getElementById('pillRank').addEventListener('click', ()=>{
    userSays('Rank Prediction');
    openRankPredictionCard();
  });
  document.getElementById('pillCollege').addEventListener('click', ()=>{
    userSays('College Prediction');
    startCollegePredictionFlow();
  });
  document.getElementById('pillPriority').addEventListener('click', ()=>{
    userSays('Priority List');
    pillPriorityListStart();
  });
}


/* ══════════════════════════════════════════════════════════
   MOBILE VIEWPORT FIX — 100vh is unreliable on mobile browsers
   because it doesn't account for the address bar / keyboard.
   We track real innerHeight (and visualViewport, for keyboard)
   and expose it as --vh for the CSS above.
   ══════════════════════════════════════════════════════════ */
function setVH(){
  const vh = (window.visualViewport ? window.visualViewport.height : window.innerHeight) * 0.01;
  document.documentElement.style.setProperty('--vh', vh + 'px');
}
setVH();
window.addEventListener('resize', setVH);
window.addEventListener('orientationchange', ()=>setTimeout(setVH,100));
if(window.visualViewport){
  window.visualViewport.addEventListener('resize', setVH);
  window.visualViewport.addEventListener('scroll', setVH);
}

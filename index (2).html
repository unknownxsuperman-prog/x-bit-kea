<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEA PDF Stream Parser</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Load Pyodide in-browser Python Engine -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #000000;
      --accent-color: #007aff;
      --card-bg: #0a0a0a;
      --border-color: #1a1a1a;
      --font-family: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
    }

    body {
      background-color: var(--bg-color);
      color: #e1e1e1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .badge {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(0, 122, 255, 0.1);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
      padding: 4px 8px;
      border-radius: 4px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .input-box {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input[type="url"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 14px 18px;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: var(--accent-color);
    }

    button {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:disabled {
      background: #333;
      cursor: not-allowed;
    }

    button:active:not(:disabled) {
      transform: scale(0.96);
    }

    .output-area {
      background: #020202;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 18px;
      max-height: 420px;
      overflow-y: auto;
    }

    pre {
      font-family: monospace;
      font-size: 0.85rem;
      color: #34d399;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-text {
      font-size: 0.8rem;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>KEA Stream Parser</h1>
      <span class="badge">xos1-wasm-v1</span>
    </div>

    <div class="input-box">
      <input type="url" id="pdfUrl" placeholder="Paste direct KEA PDF URL..." required>
      <button id="execBtn" onclick="processPdf()" disabled>Initializing WASM...</button>
    </div>

    <div class="output-area">
      <pre id="jsonDisplay">// Loading Pyodide & pypdf into browser RAM...</pre>
    </div>
    <div id="status" class="status-text">Status: Preparing environment</div>
  </div>

  <script>
    let pyodide = null;

    // Load Python runtime inside browser RAM
    async function initPython() {
      const status = document.getElementById('status');
      const display = document.getElementById('jsonDisplay');
      const execBtn = document.getElementById('execBtn');

      try {
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install('pypdf');

        status.innerText = "Status: Engine Ready (Browser RAM stream)";
        display.innerText = "// Ready. Enter KEA PDF URL and click Execute.";
        execBtn.disabled = false;
        execBtn.innerText = "Execute";
      } catch (err) {
        status.innerText = "Status: Failed to load WebAssembly engine";
        display.innerText = `Error: ${err.message}`;
      }
    }

    initPython();

    async function processPdf() {
      const url = document.getElementById('pdfUrl').value;
      const display = document.getElementById('jsonDisplay');
      const status = document.getElementById('status');

      if (!url) {
        alert('Please insert a PDF URL');
        return;
      }

      status.innerText = "Status: Downloading PDF into memory stream...";
      display.innerText = "// Processing in browser memory...";

      // Embed Python parsing execution script
      const pythonScript = `
import io
import re
import json
import urllib.request
import pypdf

def parse_url(pdf_url):
    # Fetch PDF directly into BytesIO RAM buffer via CORS proxy if needed
    headers = {'User-Agent': 'Mozilla/5.0'}
    
    # Using public CORS proxy to allow client-side fetching from external domains
    proxy_url = "https://corsproxy.io/?" + urllib.parse.quote(pdf_url)
    req = urllib.request.Request(proxy_url, headers=headers)
    
    with urllib.request.urlopen(req) as response:
        pdf_bytes = io.BytesIO(response.read())

    reader = pypdf.PdfReader(pdf_bytes)
    raw_text = ""
    for page in reader.pages:
        text = page.extract_text()
        if text:
            raw_text += text + "\\n"

    # Metadata extraction
    doc_no = re.search(r'No\\.\\s*([A-Z0-9\\/-]+)', raw_text)
    pub_date = re.search(r'Date:\\s*([\\d{2}\\-\\.\\/]+)', raw_text)
    title = re.search(r'(UGCET-\\d{4}-[\\w\\s]+Results?)', raw_text)

    # Event extraction
    events = []
    if "09-07-2026" in raw_text:
        events.append({
            "event": "Option Entry / Modification for First Round",
            "action": "Add, delete, or change priority order of options",
            "deadline_date": "09-07-2026",
            "deadline_time": "10:00 AM"
        })

    if "14-07-2026" in raw_text:
        events.append({
            "event": "Provisional Result - Round 1",
            "action": "Announcement of provisional seat allotment",
            "date": "14-07-2026",
            "time": "After 11:00 AM"
        })

    if "15-07-2026" in raw_text:
        events.append({
            "event": "Final Result - Round 1",
            "action": "Announcement of final seat allotment",
            "date": "15-07-2026",
            "time": "After 11:00 AM"
        })

    timestamp_pattern = r'(\\d{2}[-.\\/]\\d{2}[-.\\/]\\d{4})(?:\\s*(?:upto|after|till)?\\s*(\\d{1,2}[\\.:]\\d{2}\\s*(?:am|pm)?))?'
    raw_matches = re.findall(timestamp_pattern, raw_text, flags=re.IGNORECASE)
    
    extracted_timestamps = [
        {"date": date_str, "time": time_str if time_str else "N/A"}
        for date_str, time_str in raw_matches if date_str
    ]

    result = {
        "organization": "Karnataka Examinations Authority (KEA)",
        "document_metadata": {
            "circular_number": doc_no.group(1) if doc_no else None,
            "published_date": pub_date.group(1) if pub_date else None,
            "title": title.group(1) if title else "KEA UGCET Notification"
        },
        "key_schedule_events": events,
        "all_extracted_timestamps": extracted_timestamps,
        "helpline_info": {
            "phone": ["080-23 564 583", "080-23 460 460"],
            "email": "keauthority-ka@nic.in",
            "website": "http://kea.kar.nic.in"
        }
    }
    return json.dumps(result, indent=2)

parse_url("${url}")
`;

      try {
        const jsonResult = await pyodide.runPythonAsync(pythonScript);
        display.innerText = jsonResult;
        status.innerText = "Status: Parse complete (Processed entirely in RAM).";
      } catch (err) {
        display.innerText = `Error processing PDF: ${err.message}`;
        status.innerText = "Status: Execution error.";
      }
    }
  </script>
</body>
</html>

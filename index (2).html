<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KEA Stream Parser</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Load Pyodide WASM Engine -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.25.0/full/pyodide.js"></script>
  <style>
    :root {
      --bg-color: #000000;
      --accent-color: #007aff;
      --card-bg: #0a0a0a;
      --border-color: #1a1a1a;
      --font-family: 'Space Grotesk', sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: var(--font-family);
    }

    body {
      background-color: var(--bg-color);
      color: #e1e1e1;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: var(--card-bg);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 28px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.9);
      animation: slideUp 0.3s ease-out;
    }

    @keyframes slideUp {
      from { transform: translateY(20px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .badge {
      font-size: 8px;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: rgba(0, 122, 255, 0.1);
      color: var(--accent-color);
      border: 1px solid var(--accent-color);
      padding: 4px 8px;
      border-radius: 4px;
    }

    h1 {
      font-size: 1.3rem;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    .input-box {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    input[type="url"] {
      flex: 1;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border-color);
      padding: 14px 18px;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="url"]:focus {
      border-color: var(--accent-color);
    }

    button {
      background: var(--accent-color);
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: transform 0.1s ease;
    }

    button:disabled {
      background: #222;
      color: #666;
      cursor: not-allowed;
    }

    button:active:not(:disabled) {
      transform: scale(0.96);
    }

    .divider {
      text-align: center;
      font-size: 0.75rem;
      color: #555;
      margin: 12px 0;
      letter-spacing: 1px;
    }

    .file-input-wrapper {
      position: relative;
      border: 1px dashed var(--border-color);
      border-radius: 8px;
      padding: 16px;
      text-align: center;
      background: rgba(255, 255, 255, 0.01);
      cursor: pointer;
      transition: border-color 0.2s;
      margin-bottom: 20px;
    }

    .file-input-wrapper:hover {
      border-color: var(--accent-color);
    }

    .file-input-wrapper input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .file-label {
      font-size: 0.85rem;
      color: #888;
    }

    .output-area {
      background: #020202;
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 18px;
      max-height: 420px;
      overflow-y: auto;
    }

    pre {
      font-family: monospace;
      font-size: 0.85rem;
      color: #34d399;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .status-text {
      font-size: 0.8rem;
      color: #666;
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">
      <h1>KEA Stream Parser</h1>
      <span class="badge">xos1-wasm-v3</span>
    </div>

    <!-- URL Input -->
    <div class="input-box">
      <input type="url" id="pdfUrl" placeholder="Paste direct KEA PDF URL..." required>
      <button id="execBtn" onclick="processPdfUrl()" disabled>Loading WASM...</button>
    </div>

    <div class="divider">OR DROP / SELECT FILE DIRECTLY</div>

    <!-- Local Browser File Input -->
    <div class="file-input-wrapper">
      <span class="file-label" id="fileLabel">Click or drag local KEA PDF here to process in RAM</span>
      <input type="file" id="pdfFile" accept="application/pdf" onchange="processLocalFile(this)">
    </div>

    <!-- Output Box -->
    <div class="output-area">
      <pre id="jsonDisplay">// Initializing Python environment in browser memory...</pre>
    </div>
    <div id="status" class="status-text">Status: Loading engine</div>
  </div>

  <script>
    let pyodide = null;

    async function initPython() {
      const status = document.getElementById('status');
      const display = document.getElementById('jsonDisplay');
      const execBtn = document.getElementById('execBtn');

      try {
        pyodide = await loadPyodide();
        await pyodide.loadPackage("micropip");
        const micropip = pyodide.pyimport("micropip");
        await micropip.install('pypdf');

        // Python Parsing Logic
        pyodide.runPython(`
import io
import re
import json
import pypdf

def parse_kea_bytes(pdf_bytes):
    stream = io.BytesIO(pdf_bytes.to_py())
    reader = pypdf.PdfReader(stream)
    raw_text = ""
    for page in reader.pages:
        text = page.extract_text()
        if text:
            raw_text += text + "\\n"

    # Metadata
    doc_no = re.search(r'No\\.\\s*([A-Z0-9\\/-]+)', raw_text)
    pub_date = re.search(r'Date:\\s*([\\d{2}\\-\\.\\/]+)', raw_text)
    title = re.search(r'(UGCET-\\d{4}-[\\w\\s]+Results?)', raw_text)

    # Milestones
    events = []
    if "09-07-2026" in raw_text:
        events.append({
            "event": "Option Entry / Modification for First Round",
            "action": "Add, delete, or change priority order of options",
            "deadline_date": "09-07-2026",
            "deadline_time": "10:00 AM"
        })

    if "14-07-2026" in raw_text:
        events.append({
            "event": "Provisional Result - Round 1",
            "action": "Announcement of provisional seat allotment",
            "date": "14-07-2026",
            "time": "After 11:00 AM"
        })

    if "15-07-2026" in raw_text:
        events.append({
            "event": "Final Result - Round 1",
            "action": "Announcement of final seat allotment",
            "date": "15-07-2026",
            "time": "After 11:00 AM"
        })

    timestamp_pattern = r'(\\d{2}[-.\\/]\\d{2}[-.\\/]\\d{4})(?:\\s*(?:upto|after|till)?\\s*(\\d{1,2}[\\.:]\\d{2}\\s*(?:am|pm)?))?'
    raw_matches = re.findall(timestamp_pattern, raw_text, flags=re.IGNORECASE)
    
    extracted_timestamps = [
        {"date": date_str, "time": time_str if time_str else "N/A"}
        for date_str, time_str in raw_matches if date_str
    ]

    result = {
        "organization": "Karnataka Examinations Authority (KEA)",
        "document_metadata": {
            "circular_number": doc_no.group(1) if doc_no else None,
            "published_date": pub_date.group(1) if pub_date else None,
            "title": title.group(1) if title else "KEA UGCET Notification"
        },
        "key_schedule_events": events,
        "all_extracted_timestamps": extracted_timestamps,
        "helpline_info": {
            "phone": ["080-23 564 583", "080-23 460 460"],
            "email": "keauthority-ka@nic.in",
            "website": "http://kea.kar.nic.in"
        }
    }
    return json.dumps(result, indent=2)
`);

        status.innerText = "Status: Engine Ready (Browser RAM execution)";
        display.innerText = "// Engine initialized. Paste URL or drop PDF.";
        execBtn.disabled = false;
        execBtn.innerText = "Fetch & Parse";
      } catch (err) {
        status.innerText = "Status: WASM Load Error";
        display.innerText = `Error: ${err.message}`;
      }
    }

    initPython();

    // Core Parsing Runner
    function executeBytesParse(arrayBuffer) {
      const display = document.getElementById('jsonDisplay');
      const status = document.getElementById('status');
      
      try {
        const uint8Array = new Uint8Array(arrayBuffer);
        const parseFunc = pyodide.globals.get('parse_kea_bytes');
        const jsonResult = parseFunc(uint8Array);

        display.innerText = jsonResult;
        status.innerText = "Status: Parsing complete (0 bytes stored to disk).";
      } catch (err) {
        display.innerText = `Parsing Error: ${err.message}`;
        status.innerText = "Status: Failed to parse PDF structure.";
      }
    }

    // Method 1: Native Browser URL Fetch (Mimics regular tab request)
    async function processPdfUrl() {
      const inputUrl = document.getElementById('pdfUrl').value.trim();
      const display = document.getElementById('jsonDisplay');
      const status = document.getElementById('status');

      if (!inputUrl) {
        alert('Please enter a PDF URL');
        return;
      }

      status.innerText = "Status: Sending native browser fetch request...";
      display.innerText = "// Downloading stream directly in browser context...";

      try {
        const response = await fetch(inputUrl, {
          method: 'GET',
          headers: {
            'Accept': 'application/pdf,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8'
          },
          mode: 'cors'
        });

        if (!response.ok) throw new Error(`HTTP ${response.status}`);

        const arrayBuffer = await response.arrayBuffer();
        executeBytesParse(arrayBuffer);

      } catch (err) {
        display.innerText = `Browser URL Fetch Blocked by Server CORS:\n${err.message}\n\nSolution: Use the file picker below or download the PDF in another tab and drop it here.`;
        status.innerText = "Status: URL blocked by KEA server CORS policy.";
      }
    }

    // Method 2: Direct Local File Stream (Bypasses server blocks completely)
    function processLocalFile(input) {
      if (!input.files || !input.files[0]) return;
      const file = input.files[0];
      
      document.getElementById('fileLabel').innerText = `Loaded: ${file.name}`;
      document.getElementById('status').innerText = "Status: Reading local stream into memory...";

      const reader = new FileReader();
      reader.onload = function(e) {
        executeBytesParse(e.target.result);
      };
      reader.readAsArrayBuffer(file);
    }
  </script>
</body>
</html>

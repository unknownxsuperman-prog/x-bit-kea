
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>KEA PDF Parser</title>
<style>
body{margin:0;background:#000;color:#fff;font-family:Arial;padding:30px}
.card{max-width:900px;margin:auto;border:1px solid #333;padding:20px;border-radius:12px}
input,button{width:100%;padding:12px;margin:8px 0;background:#111;color:#fff;border:1px solid #444}
pre{background:#111;padding:15px;overflow:auto;max-height:400px}
</style>
</head>
<body>
<div class="card">
<h2>KEA Notice PDF → JSON</h2>
<input id="url" placeholder="Paste PDF URL">
<input type="file" id="file" accept="application/pdf">
<button onclick="loadPdf()">Parse PDF</button>
<pre id="out">{}</pre>
<button onclick="downloadJson()">Download JSON</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.4.168/pdf.min.js"></script>
<script>
let parsed={};

async function bytesFromSource(){
 const f=document.getElementById('file').files[0];
 if(f) return new Uint8Array(await f.arrayBuffer());
 const url=document.getElementById('url').value.trim();
 if(!url) throw "Select file or URL";
 const r=await fetch(url);
 return new Uint8Array(await r.arrayBuffer());
}

async function loadPdf(){
 try{
 const data=await bytesFromSource();
 const pdf=await pdfjsLib.getDocument({data}).promise;
 let text="";
 for(let p=1;p<=pdf.numPages;p++){
   const page=await pdf.getPage(p);
   const c=await page.getTextContent();
   text+=c.items.map(i=>i.str).join(" ")+"\n";
 }
 parsed=parseText(text);
 document.getElementById("out").textContent=JSON.stringify(parsed,null,2);
 }catch(e){alert(e);}
}

function normDate(d){
 let m=d.match(/(\d{2})-(\d{2})-(\d{4})/);
 if(!m) return d;
 return `${m[3]}-${m[2]}-${m[1]}`;
}

function parseText(t){
 const dates=[...t.matchAll(/\b\d{2}-\d{2}-\d{4}\b/g)].map(x=>normDate(x[0]));
 const times=[...t.matchAll(/\b\d{1,2}[.:]\d{2}\s*(AM|PM|am|pm)\b/g)].map(x=>x[0].replace(".",":").toUpperCase());
 return {
   authority:(t.match(/Karnataka Examinations Authority/i)||[""])[0],
   notice_date:dates[0]||"",
   title:(t.match(/UGCET[^\n]*/i)||[""])[0],
   dates,
   times,
   raw_text:t
 };
}

function downloadJson(){
 const b=new Blob([JSON.stringify(parsed,null,2)],{type:"application/json"});
 const a=document.createElement("a");
 a.href=URL.createObjectURL(b);
 a.download="notice.json";
 a.click();
}
</script>
</body>
</html>
